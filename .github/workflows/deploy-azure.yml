name: Build and Deploy Node.js Backend to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: .
        run: npm install

      - name: Run tests
        working-directory: .
        run: npm test -- --coverage --detectOpenHandles --passWithNoTests
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      # 1️⃣ Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # 3️⃣ Cài dependencies và build
      - name: Install dependencies
        working-directory: .
        run: npm install

      # 4️⃣ Setup environment file (optional - nếu cần)
      - name: Create .env file
        working-directory: .
        run: |
          echo "NODE_ENV=production" > .env
          # Thêm các biến môi trường khác tại đây nếu cần

      # 5️⃣ Đóng gói dự án thành file release.zip
      - name: Zip backend folder for deployment
        run: |
          # Không loại trừ node_modules (đã install rồi)
          zip -r release.zip . \
            -x "*.git*" \
            -x "*.github*" \
            -x "logs/*" \
            -x ".env.local" \
            -x ".env.*.local"

      # 6️⃣ Upload artifact sang job deploy
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      # 7️⃣ Tải lại artifact từ job build
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # 8️⃣ Giải nén file zip
      - name: Unzip artifact for deployment
        run: unzip -q release.zip

      # 9️⃣ Đăng nhập vào Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 🔟 Deploy lên Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "gzmart-api"
          slot-name: "Production"
          package: .
